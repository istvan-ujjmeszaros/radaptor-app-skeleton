name: Playwright E2E

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      APP_HTTP_PORT: 8080
      APP_HTTPS_PORT: 8443
      APP_DB_PORT: 33308
      APP_MAILPIT_HTTP_PORT: 38026
      APP_MAILPIT_SMTP_PORT: 31026
      APP_SWOOLE_PORT: 39511
      APP_MCP_PORT: 39512
      RADAPTOR_DISABLE_LOCAL_OVERRIDES: 1
      RADAPTOR_DOCKER_VOLUME_PREFIX: radaptor-app-skeleton-ci-${{ github.run_id }}-${{ github.run_attempt }}
      E2E_BASE_URL: http://127.0.0.1:8080

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Write CI Docker env
        shell: bash
        run: |
          cat > .env <<EOF
          APP_HTTP_PORT=${APP_HTTP_PORT}
          APP_HTTPS_PORT=${APP_HTTPS_PORT}
          APP_DB_PORT=${APP_DB_PORT}
          APP_MAILPIT_HTTP_PORT=${APP_MAILPIT_HTTP_PORT}
          APP_MAILPIT_SMTP_PORT=${APP_MAILPIT_SMTP_PORT}
          APP_SWOOLE_PORT=${APP_SWOOLE_PORT}
          APP_MCP_PORT=${APP_MCP_PORT}
          RADAPTOR_DISABLE_LOCAL_OVERRIDES=${RADAPTOR_DISABLE_LOCAL_OVERRIDES}
          RADAPTOR_DOCKER_VOLUME_PREFIX=${RADAPTOR_DOCKER_VOLUME_PREFIX}
          EOF

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npm run e2e:install-browsers

      - name: Build PHP platform image
        run: ./docker/build-php-platform.sh dev

      - name: Start app stack
        run: docker compose -f docker-compose-dev.yml up -d --build

      - name: Install Composer dependencies
        run: ./composer.sh install --no-interaction --no-progress

      - name: Install Radaptor packages
        run: ./radaptor.sh install --json

      - name: Wait for app
        shell: bash
        run: |
          for i in {1..60}; do
            if curl -fsS "$E2E_BASE_URL/login.html" >/dev/null; then
              exit 0
            fi
            docker compose -f docker-compose-dev.yml ps
            sleep 2
          done

          docker compose -f docker-compose-dev.yml logs --no-color
          exit 1

      - name: Run Playwright E2E
        run: npm run e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tmp/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: tmp/test-results/
          if-no-files-found: ignore

      - name: Docker logs
        if: failure()
        run: docker compose -f docker-compose-dev.yml logs --no-color

      - name: Stop app stack
        if: always()
        run: docker compose -f docker-compose-dev.yml down -v --remove-orphans
